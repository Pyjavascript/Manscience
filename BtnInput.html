<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap"
      rel="stylesheet"
    />
  </head>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Manrope", sans-serif;
    }
    main {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: brown;
      padding: 20px;
    }
    
    /* Smooth Main Wrapper Container */
    .container {
      background: white;
      border: 3px solid rgba(255, 255, 255, 0);
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 160px; /* Adjusted to house padding gracefully */
      max-width: 550px;
      border-radius: 40px;
      overflow: hidden;
      padding: 5px;
      transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
    }
    .container.active {
      width: 100%;
    }

    .input.inpError {
      color: red !important;
    }
    .input {
      font-size: 16px;
      width: 0;
      opacity: 0;
      font-weight: 600;
      border-radius: 40px;
      border: none;
      color: #b05a36;
      outline: none;
      padding: 0;
      margin-left: 0;
      transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
    }
    .input.activeBtn {
      width: 100%;
      opacity: 1;
      padding: 10px 15px;
    }

    /* Elegant Button Transformations handled by CSS states */
    .subscribe {
      background: white;
      color: #b05a36;
      font-weight: 600;
      border: none;
      cursor: pointer;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      white-space: nowrap;
      font-size: 16px;
      width: 150px;
      height: 48px;
      border-radius: 40px;
      transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
    }
    
    /* Transition to smooth arrow icon button */
    .container.active .subscribe {
      width: 48px;
      background: #b05a36;
      color: white;
      border-radius: 50%;
    }

    .txt {
      display: flex;
      justify-content: center;
      align-items: center;
      position: absolute;
      width: 100%;
      height: 100%;
      left: 0;
      top: 0;
      transition: opacity 0.3s ease;
    }
    
    /* Hide label instantly when layout updates to keep arrow centered */
    .container.active .txt {
      opacity: 0;
      visibility: hidden;
    }

    /* Arrow icon wrapper states */
    .arrow-icon {
      position: absolute;
      font-size: 20px;
      opacity: 0;
      transform: scale(0.6);
      transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container.active .arrow-icon {
      opacity: 1;
      transform: scale(1);
    }

    /* Fixed spinner visibility & animation */
    .circle {
      position: absolute;
      display: flex;
      opacity: 0;
      visibility: hidden;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }
    .circle img {
      width: 24px;
      height: 24px;
    }

    /* Clean loading state toggles */
    .container.loading .arrow-icon {
      opacity: 0;
      transform: scale(0.6);
    }
    .container.loading .circle {
      opacity: 1;
      visibility: visible;
    }

    @media (min-width: 768px) {
      .input.activeBtn {
        width: 350px;
      }
      .container.active {
        width: auto;
      }
    }
  </style>
  <body>
    <main>
      <div class="container">
        <input
          type="email"
          class="input"
          placeholder="Enter Your email"
          required
        />
        <button class="subscribe">
          <div class="txt">Get Notified!</div>
          <div class="arrow-icon">&rarr;</div>
          <div class="circle">
            <img src="https://cdn.prod.website-files.com/6a1826bc669d4e5768e968dd/6a3e940f4d4e8d83d4731272_fade-stagger-circles.svg" alt="load"/>
          </div>
        </button>
      </div>
    </main>
    <script>
      const input = document.querySelector(".input");
      const subscribe = document.querySelector(".subscribe");
      const txtDiv = document.querySelector(".txt");
      const container = document.querySelector(".container");

      function validateEmail(email) {
        const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        return re.test(email);
      }

      const scriptURL = "https://script.google.com/macros/s/AKfycbzp8JrWBzUvNjSsypoAc-JA0uDjBI0K63WdAszdMsZLt47vlXwn3H-YRILMsA6tHYWJ/exec";

      async function handleSubscribe() {
        const emailValue = input.value.trim();

        if (emailValue !== "") {
          if (!validateEmail(emailValue)) {
            input.classList.add("inpError");
            return; 
          }
          
          input.classList.remove("inpError");
          container.classList.add("loading");

          try {
            const response = await fetch(scriptURL, {
              method: "POST",
              mode: "cors",
              headers: {
                "Content-Type": "text/plain",
              },
              body: JSON.stringify({ email: emailValue }),
            });

            const result = await response.json();
            container.classList.remove("loading");

            if (result.result === "success") {
              // Swap view states safely before altering labels
              input.classList.remove("activeBtn");
              container.classList.remove("active");
              input.value = "";
              
              // Set success response text seamlessly
              txtDiv.textContent = "Thank you!";
              
              setTimeout(() => {
                txtDiv.textContent = "Get Notified!";
              }, 3000);
            } else {
              txtDiv.textContent = "Error";
              input.classList.remove("activeBtn");
              container.classList.remove("active");
              console.error(result.error);
            }
          } catch (error) {
            container.classList.remove("loading");
            txtDiv.textContent = "Network Error";
            input.classList.remove("activeBtn");
            container.classList.remove("active");
            console.error("Error sending data:", error);
          }
        } else {
          input.focus();
        }
      }

      input.addEventListener("input", () => {
        input.classList.remove("inpError");
      });

      subscribe.addEventListener("click", (event) => {
        event.preventDefault();

        if (!container.classList.contains("active")) {
          input.classList.add("activeBtn");
          container.classList.add("active");
          
          setTimeout(() => input.focus(), 100);
        } else {
          handleSubscribe();
        }
      });

      input.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          handleSubscribe();
        }
      });
    </script>
  </body>
</html>
